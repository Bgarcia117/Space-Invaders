# Name shown in the GitHub Actions tab
name: Build and Release

# When to run this workflow.
# 'push: tags: v*' means: run when a tag starting with "v" is pushed
# (e.g. v1.0, v1.2.3). Regular pushes to branches will NOT trigger this.
# 'workflow_dispatch' adds a "Run workflow" button in the Actions tab so
# we can build a test zip on demand without publishing a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Permissions this workflow needs.
# 'contents: write' is required so the workflow can create a GitHub Release
# and upload the built zip to it.
permissions:
  contents: write

# A workflow can have one or more jobs. Each job runs on a fresh VM.
jobs:
  # Job name — shown in the Actions UI
  build-windows:
    # The VM operating system. windows-latest gives us a Windows Server VM
    # with MSVC, CMake, git, and PowerShell already installed.
    runs-on: windows-latest

    # Steps run in order. Each step is a shell command or a pre-made action.
    steps:
      # Downloads your repo onto the VM so the next steps can build it.
      - name: Checkout code
        uses: actions/checkout@v4

      # Runs CMake to generate build files. Same command you'd run locally,
      # plus -DCMAKE_BUILD_TYPE=Release for an optimized (non-debug) build.
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # Compiles the game. --config Release tells MSVC to produce Release
      # binaries (matches the flag above).
      - name: Build
        run: cmake --build build --config Release

      # Bundles the built exe + assets + DLLs into a single zip file.
      # 'pwsh' means run these commands in PowerShell (Windows shell).
      - name: Package release
        shell: pwsh
        run: |
          # ${{ github.ref_name }} is the tag name that triggered the workflow
          # (e.g. "v1.0"). We use it in the folder and zip name.
          $version = "${{ github.ref_name }}"
          $stageDir = "SpaceInvaders-$version"

          # Create a fresh folder and copy everything from the build output dir.
          # On Windows MSVC, the exe + DLLs + assets end up in build/bin/Release/.
          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item -Recurse -Path build/bin/Release/* -Destination $stageDir

          # Zip that folder into SpaceInvaders-v1.0-windows.zip (or similar).
          Compress-Archive -Path $stageDir -DestinationPath "SpaceInvaders-$version-windows.zip"

      # Uploads the zip as a workflow artifact so it can be downloaded from the
      # run's summary page (Actions tab > this run > Artifacts). This runs on
      # every trigger, including manual runs, so we can test builds without
      # publishing a release. Artifacts are kept for ~90 days by default.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceInvaders-windows
          path: SpaceInvaders-*-windows.zip

      # Creates a GitHub Release for the tag and attaches the zip to it.
      # generate_release_notes: true tells GitHub to auto-fill the release
      # description with commits since the previous tag.
      # The 'if' gate skips this step on manual (workflow_dispatch) runs
      # since there's no tag to attach the release to.
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SpaceInvaders-*-windows.zip
          generate_release_notes: true
